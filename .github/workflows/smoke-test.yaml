name: "Smoke Test"
on:
  push:
    branches:
      - main
      - release/*
  pull_request:
    branches:
      - "*"

defaults:
  run:
    shell: bash

env:
  GRADLE_EXEC: ./gradlew

jobs:
  smoke-test:
    name: "Smoke Tests"
    runs-on: block-node-linux-medium
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@17d0e2bd7d51742c71671bd19fa12bdc9d40a3d6 # v2.8.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          fetch-depth: 0

      - name: Expand Shallow Clone for Spotless
        run: |
          if [ -f .git/shallow ]; then
            git fetch --unshallow --no-recurse-submodules
          else
            echo "Repository is not shallow, no need to unshallow."
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@99b8673ff64fbf99d8d325f52d9a5bdedb8483e9 # v4.2.1
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install grpcurl
        run: |
          curl -L https://github.com/fullstorydev/grpcurl/releases/download/v1.8.7/grpcurl_1.8.7_linux_x86_64.tar.gz -o grpcurl.tar.gz
          sudo tar -xzf grpcurl.tar.gz -C /usr/local/bin grpcurl
          rm grpcurl.tar.gz

      - name: Cache Gradle packages
        uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4.0.2
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Smoke Tests
        run: ${{ env.GRADLE_EXEC }} buildSmokeTestsContainer -x test

      - name: Set Project Version Env Variable
        run: echo "GRADLE_PROJECT_VERSION=$(${{ env.GRADLE_EXEC }} -q printProjectVersion)" >> "$GITHUB_ENV"

      # TODO if I use 'docker compose' from a shell script (meaning I call a shell scrip here instead)
      # I get permission denied and it exits (which makes sense). Locally with the tool act I am able
      # to reproduce it as well. If I use 'docker-compose' from a shell script however, locally with
      # act it seems to pass, so maybe will pass in gh actions as well, but when I pushed, it exited
      # saying 'docker-compose not found'. In theory maybe we can have 'docker-compose' available
      # in gh actions so we can have a single gradle script that will do all the job and we will
      # not need all these steps that will use docker directly (which was the initial idea)
      - name: Create & Start Smoke Tests Container
        working-directory: server/docker/
        run: |
          docker buildx build --load -t "block-node-server:${{ env.GRADLE_PROJECT_VERSION }}" --build-context distributions=../build/distributions --build-arg VERSION="${{ env.GRADLE_PROJECT_VERSION }}" . || exit "${?}"
          docker compose -p block-node up -d

      - name: Run Smoke Test
        working-directory: server/src/test/resources/
        run: ./smoke-test.sh

      - name: Stop Smoke Tests Container
        run: docker compose -p block-node stop
